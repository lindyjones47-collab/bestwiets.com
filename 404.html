<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Best Wiet — redirecting…</title>
  <script>
    /* GitHub Pages SPA fallback.
       GitHub serves this file (HTTP 404) for any path without a real file,
       e.g. /verschil-hasj-en-wiet or /shop. We preserve that clean permalink
       in a ?p= param and hand off to the app at "/", which restores the URL.
       This keeps index.html as the single source of truth — no per-route copies. */
    (function () {
      var l = location;
      l.replace('/?p=' + encodeURIComponent(l.pathname + l.search) + (l.hash || ''));
    })();
  </script>
</head>
<body>Redirecting…</body>
</html>
